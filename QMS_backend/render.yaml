services:
  - type: web
    name: qms-backend
    runtime: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -Xms128m -Xmx256m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -jar target/qms-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/health
    envVars:
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: JAVA_TOOL_OPTIONS
        value: -Xms128m -Xmx256m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m
