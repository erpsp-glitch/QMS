# =========================================================
# GOOGLE DRIVE
# =========================================================

google.drive.enabled=false
google.credentials.path=./google-credentials.json
google.drive.folder-id=your_root_folder_id_here
google.application.name=DaSsk-QMS

# =========================================================
# CORS
# =========================================================

qms.cors.allowed-origins=http://localhost:5009,http://localhost:3000

# =========================================================
# LOGGING
# =========================================================

logging.level.root=INFO
logging.level.com.ERP.QMS=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =========================================================
# ACTUATOR
# =========================================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =========================================================
# SERVER ERROR SETTINGS
# =========================================================

server.error.include-message=always
server.error.include-binding-errors=always

# =========================================================
# JACKSON JSON
# =========================================================

spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.time-zone=Asia/Kolkata

# =========================================================
# THYMELEAF (OPTIONAL)
# =========================================================

spring.thymeleaf.cache=false

# =========================================================
# DEVTOOLS (OPTIONAL)
# =========================================================

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true